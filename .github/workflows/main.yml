name: Deploy Snake Game to My Server

on:
  push:
    branches: ["main"] # 当你 push 到 main 分支时自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: snake/package-lock.json

      - name: 3. 安装依赖并打包
        run: |
          cd snake
          npm install
          npm run build

      - name: 4. 自动化部署到云服务器
        uses: easingthemes/ssh-deploy@main
        with:
          # 下面这些变量会自动读取你在 GitHub Settings 里填的 Secrets
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }} 
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          # 同步整个 snake 目录（包含 dist 和 server）
          SOURCE: "snake/"
          TARGET: "/var/www/project/snake/"
          # 排除本地开发文件和依赖包，减少同步体积
          EXCLUDE: "/node_modules/, /src/, /public/, /tsconfig.json/, /vite.config.ts/, /package.json/, /package-lock.json/, /eslint.config.js/, /.env.production/, /index.html/, /vercel.json/, /README.md/"
          # 部署前先清空服务器目标目录里的旧文件
          ARGS: "-rlgoDzvc --delete"

      - name: 5. 启动/重启后端服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/project/snake/server
            # 安装 Python 依赖
            python3 -m pip install -r requirements.txt
            # 查找并杀掉已有的 uvicorn 进程 (如果有)
            pkill -f "uvicorn main:app" || true
            # 以后台模式启动 uvicorn，运行在 8000 端口
            nohup python3 -m uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
