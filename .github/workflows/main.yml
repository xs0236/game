name: Deploy Snake Game to My Server

on:
  push:
    branches: ["main"] # 当你 push 到 main 分支时自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: snake/package-lock.json

      - name: 3. 安装依赖并打包
        run: |
          cd snake
          npm install
          npm run build

      - name: 4. 自动化部署到云服务器 (前端)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "snake/dist/"
          TARGET: "/var/www/project/snake/dist/"
          ARGS: "-rlgoDzvc --delete"

      - name: 5. 自动化部署到云服务器 (后端)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "snake/server/"
          TARGET: "/var/www/project/snake/server/"
          ARGS: "-rlgoDzvc --delete"

      - name: 6. 启动/重启后端服务 & 修正权限
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 修正目录权限，确保 Nginx (www-data) 有权访问
            sudo chown -R ${{ secrets.SERVER_USER }}:www-data /var/www/project/snake
            sudo chmod -R 755 /var/www/project/snake

            cd /var/www/project/snake/server
            # 安装 Python 依赖
            python3 -m pip install -r requirements.txt
            # 查找并杀掉已有的 uvicorn 进程 (如果有)
            pkill -f "uvicorn main:app" || true
            # 以后台模式启动 uvicorn，运行在 8000 端口
            nohup python3 -m uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
            
            # 尝试重启 Nginx 以确保配置生效
            sudo nginx -s reload || true
