name: Deploy Snake Game to My Server

on:
  push:
    branches: ["main"] # 当你 push 到 main 分支时自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: snake/package-lock.json

      - name: 3. 安装依赖并打包
        run: |
          cd snake
          npm install
          npm run build

      - name: 4. 自动化部署 (仅同步运行代码)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "snake/"
          TARGET: "/var/www/project/snake/"
          # 排除所有源代码和配置文件，只保留运行所需的目录
          EXCLUDE: "/src/, /public/, /node_modules/, /.*, /*.json, /*.ts, /*.js, /*.md, /*.yaml, /README.md"
          ARGS: "-rlgoDzvc --delete"
