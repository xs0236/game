name: Deploy Snake Game to My Server

on:
  push:
    branches: ["main"] # 当你 push 到 main 分支时自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ai-snake-game/package-lock.json

      - name: 3. 安装依赖并打包
        run: |
          cd ai-snake-game
          npm install
          npm run build

      - name: 4. 自动化部署到云服务器
        uses: easingthemes/ssh-deploy@main
        with:
          # 下面这些变量会自动读取你在 GitHub Settings 里填的 Secrets
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }} 
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          # 这是打包后的目录
          SOURCE: "ai-snake-game/dist/"
          # 这是你服务器上存放网页的目录，记得改成你自己的实际路径！
          # 比如：/var/www/html 或者 /www/wwwroot/your-site
          TARGET: "/var/www/html" 
          # 部署前先清空服务器目标目录里的旧文件
          ARGS: "-rlgoDzvc --delete"